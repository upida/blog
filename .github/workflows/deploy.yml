name: Deploy to Dokku

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ vars.DOKKU_SSH_PRIVATE_KEY }}

      - name: Add Dokku host to known_hosts
        run: ssh-keyscan -H ${{ secrets.DOKKU_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy
        run: |
          cat ~/.ssh/id_ed25519
          ssh -vvv dokku@${{ secrets.DOKKU_HOST }}
          git remote add dokku dokku@${{ secrets.DOKKU_HOST }}:${{ secrets.DOKKU_APP }} || true
          git push dokku main --force
